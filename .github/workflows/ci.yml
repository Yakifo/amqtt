---
name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

env:
  UV_CACHE_DIR: /tmp/.uv-cache
  PROJECT_PATH: "amqtt"

permissions:
  contents: read

jobs:
  validate-metadata:
    name: Validate GitHub metadata
    runs-on: ubuntu-latest

    steps:
      - name: Validate ref metadata
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          check_ref() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              return 0
            fi

            if [[ ! "$value" =~ ^[A-Za-z0-9._/-]{1,255}$ ]] ||
              [[ "$value" == -* || "$value" == */ || "$value" == *. ||
                "$value" == *..* || "$value" == *//* ||
                "$value" == *@{* || "$value" == *.lock ]]; then
              echo "::error::$name contains unsupported characters for CI metadata"
              exit 1
            fi
          }

          check_ref BASE_REF "$BASE_REF"
          check_ref HEAD_REF "$HEAD_REF"
          check_ref REF_NAME "$REF_NAME"

          if [[ "$REF_TYPE" == "tag" &&
            ! "$REF_NAME" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][A-Za-z0-9]+)*$ ]]; then
            echo "::error::Release tags must match vMAJOR.MINOR[.PATCH][-PRERELEASE]"
            exit 1
          fi

  code-quality:
    name: Check code quality
    runs-on: ubuntu-latest
    needs: validate-metadata

    steps:
      # https://github.com/actions/checkout
      - name: ⤵️ Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # https://github.com/astral-sh/setup-uv
      - name: 🏗 Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ${{ env.UV_CACHE_DIR }}
          save-cache: ${{ github.event_name != 'pull_request' }}
          python-version: "3.13"

      - name: install openldap dependencies
        run: sudo apt-get install -y libldap2-dev libsasl2-dev

      - name: 🏗 Install the project
        run: uv sync --locked --dev --all-extras

      - name: Run secret scan
        run: uv run --frozen pre-commit run gitleaks-full --hook-stage manual

      - name: Run mypy
        run: uv run --frozen mypy ${{ env.PROJECT_PATH }}/
      - name: Pylint review
        run: uv run --frozen pylint ${{ env.PROJECT_PATH }}/
      - name: Bandit security check
        run: uv run --frozen bandit -r ${{ env.PROJECT_PATH }}/
      - name: Semgrep security check
        run: uv run --frozen semgrep scan --error --config p/default --config p/python --config p/trailofbits --config p/xss ${{ env.PROJECT_PATH }}/
      - name: Ruff check
        run: uv run --frozen ruff check ${{ env.PROJECT_PATH }}/

      - name: Check if requirements.txt is up-to-date (needed for OpenSSF scorecard)
        run: |
          uv pip compile pyproject.toml --generate-hashes --output-file /tmp/requirements.txt --custom-compile-command "uv pip compile pyproject.toml --generate-hashes --output-file requirements.txt"
          diff -u requirements.txt /tmp/requirements.txt

  tests:
    name: Run tests
    runs-on: ubuntu-latest
    needs: validate-metadata

    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      # https://github.com/actions/checkout
      - name: ⤵️ Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # https://github.com/astral-sh/setup-uv
      - name: 🏗 Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          cache-local-path: ${{ env.UV_CACHE_DIR }}
          save-cache: ${{ github.event_name != 'pull_request' }}
          python-version: ${{ matrix.python-version }}

      - name: install openldap dependencies
        run: sudo apt-get install -y libldap2-dev libsasl2-dev

      - name: 🏗 Install the project
        run: uv sync --locked --dev --all-extras

      - name: Run pytest
        run: uv run --frozen pytest tests/ --cov=./ --cov-report=xml --junitxml=pytest-report.xml

      # https://github.com/actions/upload-artifact
      - name: Upload test report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: pytest-report.xml

      # https://github.com/actions/upload-artifact
      - name: Upload coverage results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-results-${{ matrix.python-version }}
          path: coverage.xml
