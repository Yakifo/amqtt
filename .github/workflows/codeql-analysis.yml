---
name: CodeQL

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "20 10 * * 0"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Validate ref metadata
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          check_ref() {
            local name="$1"
            local value="$2"

            if [[ -z "$value" ]]; then
              return 0
            fi

            if [[ ! "$value" =~ ^[A-Za-z0-9._/-]{1,255}$ ]] ||
              [[ "$value" == -* || "$value" == */ || "$value" == *. ||
                "$value" == *..* || "$value" == *//* ||
                "$value" == *@{* || "$value" == *.lock ]]; then
              echo "::error::$name contains unsupported characters for CI metadata"
              exit 1
            fi
          }

          check_ref BASE_REF "$BASE_REF"
          check_ref HEAD_REF "$HEAD_REF"
          check_ref REF_NAME "$REF_NAME"

          if [[ "$REF_TYPE" == "tag" &&
            ! "$REF_NAME" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][A-Za-z0-9]+)*$ ]]; then
            echo "::error::Release tags must match vMAJOR.MINOR[.PATCH][-PRERELEASE]"
            exit 1
          fi

      # https://github.com/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # https://github.com/github/codeql-action
      - name: Initialize CodeQL
        uses: github/codeql-action/init@24ea975727876cf496b1eb0c5b36e96e01600b51 # v4.37.0
        with:
          languages: ${{ matrix.language }}

      # https://github.com/github/codeql-action
      - name: Autobuild
        uses: github/codeql-action/autobuild@24ea975727876cf496b1eb0c5b36e96e01600b51 # v4.37.0

      # https://github.com/github/codeql-action
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@24ea975727876cf496b1eb0c5b36e96e01600b51 # v4.37.0
        with:
          category: "/language:${{matrix.language}}"
