---
name: Release Drafter

on:
  push:
    tags:
      # Push events to matching v*, i.e. v1.0, v20.15.10
      - "v*"
  workflow_dispatch:

permissions: read-all

jobs:
  update_release_draft:
    name: Update Release Draft
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Validate tag metadata
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          if [[ "$REF_TYPE" == "tag" &&
            ! "$REF_NAME" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][A-Za-z0-9]+)*$ ]]; then
            echo "::error::Release tags must match vMAJOR.MINOR[.PATCH][-PRERELEASE]"
            exit 1
          fi

      # https://github.com/release-drafter/release-drafter
      - uses: release-drafter/release-drafter@67e173cadb2fbd3de94f4a861e0c48c913b462ae # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
